<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Your Enquiry Is With the House | Madame Wedding Design</title>
<meta name="description" content="Your celebration has our full attention. Madame Wedding Design replies to every enquiry, personally.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://madamewedding.design/inquire/thank-you/">
<link rel="icon" href="/assets/brand/favicon/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/favicon/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/brand/favicon/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/brand/favicon/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/site.css">
<style>
/* The sealed letter, in three quiet movements:
   1. The letter surfaces on hunter — their name, a word from the house, thank you.
   2. Two ivory curtains draw closed over it, slow and hushed.
   3. The house's hunter logo settles on the curtain, like a cachet.
   Reduced motion receives the finished letter, still and complete. */
body.letter{background:var(--threshold);overflow:hidden;}

.letter-scene{position:fixed;inset:0;z-index:var(--z-overlay);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  color:var(--ivory);padding:24px;opacity:0;animation:appear 1.4s ease .2s forwards;}
.letter-scene .dear{font-family:var(--display);font-style:italic;font-weight:300;font-size:clamp(24px,3.4vw,34px);
  line-height:1.3;text-wrap:balance;opacity:0;animation:appear 1.2s ease 1.1s forwards;}
.letter-scene p.msg{max-width:46ch;margin-top:22px;font-size:18px;line-height:1.9;color:rgba(247,244,238,.85);
  text-wrap:pretty;opacity:0;animation:appear 1.2s ease 1.8s forwards;}
.letter-scene .thanks{font-family:var(--display);font-style:italic;font-weight:300;font-size:clamp(28px,4vw,42px);
  line-height:1.2;margin-top:34px;opacity:0;animation:appear 1.2s ease 2.6s forwards;}

/* The curtains: two ivory panels drawing closed, hushed and slow */
/* Curtains in the sand of the logo suite — the final view IS the brand board */
.curtain{position:fixed;top:0;bottom:0;width:51vw;background:#DBD3C0;z-index:calc(var(--z-overlay) + 1);}
.curtain.left{left:0;transform:translateX(-102%);animation:drawL 2.6s cubic-bezier(.6,.05,.28,.99) 7.2s forwards;}
.curtain.right{right:0;transform:translateX(102%);animation:drawR 2.6s cubic-bezier(.6,.05,.28,.99) 7.2s forwards;}
@keyframes drawL{to{transform:translateX(0);}}
@keyframes drawR{to{transform:translateX(0);}}

/* The cachet: the hunter logo settles onto the closed curtain */
.cachet{position:fixed;inset:0;z-index:calc(var(--z-overlay) + 2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  opacity:0;transform:scale(1.05);animation:settle 1.8s ease 9.6s forwards;pointer-events:none;}
.cachet .mark{display:flex;align-items:center;justify-content:center;}
/* Estelle's original board: same sand as the curtains, so it melts into them
   and carries the true embossed cipher. */
.cachet .mark img{width:min(760px,92vw);height:auto;}
.cachet .back{pointer-events:auto;margin-top:-4vh;font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--ink);border-bottom:1px solid var(--ink-15);padding:10px 2px 6px;transition:border-color .5s;}
.cachet .back:hover{border-color:var(--ink);}
@keyframes appear{to{opacity:1;}}
@keyframes settle{to{opacity:1;transform:none;}}

/* Reduced motion: the finished letter, still — ivory logo on hunter, no curtains */
.cachet img.rm{display:none;}
@media(prefers-reduced-motion:reduce){
  .letter-scene{position:static;min-height:70vh;}
  .letter-scene,.letter-scene .dear,.letter-scene p.msg,.letter-scene .thanks{opacity:1;animation:none;}
  .curtain{display:none;}
  .cachet{position:static;opacity:1;transform:none;animation:none;margin:40px 0 60px;gap:32px;}
  .cachet .mark{display:none;}
  .cachet img.rm{display:block;width:min(220px,50vw);}
  .cachet .back{color:var(--ivory);border-color:rgba(247,244,238,.35);}
  body.letter{overflow:auto;}
}
</style>
</head>
<body class="letter">

<main class="letter-scene" id="main">
  <p class="dear"><span data-dear>Dear friends</span>,</p>
  <p class="msg">Your enquiry has entered the house. It will be read the way everything here is handled &mdash; personally, and in confidence. Estelle will write to you, personally.</p>
  <h1 class="thanks">Thank you.</h1>
</main>

<div class="curtain left" aria-hidden="true"></div>
<div class="curtain right" aria-hidden="true"></div>

<div class="cachet">
  <span class="mark"><img src="/assets/brand/logo-principal-hunter.png" alt="" aria-hidden="true" width="1374" height="1026"></span>
  <img class="rm" src="/assets/brand/logo-ivory.png" alt="" aria-hidden="true" width="817" height="363">
  <a class="back" href="/">Return to the house</a>
</div>

<script>
/* The enquiry form leaves the visitor's name for the letter; nothing is sent
   anywhere from here. Falls back to "Dear friends" gracefully. Runs now and
   again on DOMContentLoaded — idempotent, whatever the parser timing. */
(function () {
  function address() {
    try {
      var n = sessionStorage.getItem("mwd-enquiry-name");
      if (!n) return;
      n = n.trim().replace(/\s+/g, " ");
      var el = document.querySelector("[data-dear]");
      if (!el || !n.length || n.length > 60) return;
      el.textContent = "Dear " + n;
      sessionStorage.removeItem("mwd-enquiry-name");
    } catch (e) { /* private mode: the letter stays addressed to friends */ }
  }
  address();
  document.addEventListener("DOMContentLoaded", address);
})();
</script>
</body>
</html>
