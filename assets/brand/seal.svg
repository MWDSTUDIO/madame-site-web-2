<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Madame Wedding Design seal">
  <!-- MWD seal — ivory line-work for the hunter-green threshold.
       Hairline double circle; inner ring drawn as a hand-basting stitch;
       house name in microtype on the upper arc; woven MWD cipher; lozenge at foot.
       TODO: replace with the engraved master (assets/brand/seal.svg) when supplied. -->
  <defs>
    <path id="arcTop" d="M 34 120 A 86 86 0 0 1 206 120" fill="none"/>
    <!-- Weave masks: each upper letter opens a clean gap where it crosses the one beneath -->
    <mask id="weaveW" maskUnits="userSpaceOnUse">
      <rect width="240" height="240" fill="#fff"/>
      <text x="103" y="146" font-family="Cormorant Garamond, Georgia, 'Times New Roman', serif" font-size="64" text-anchor="middle" fill="none" stroke="#000" stroke-width="7">M</text>
    </mask>
    <mask id="weaveD" maskUnits="userSpaceOnUse">
      <rect width="240" height="240" fill="#fff"/>
      <text x="122" y="152" font-family="Cormorant Garamond, Georgia, 'Times New Roman', serif" font-size="58" text-anchor="middle" fill="none" stroke="#000" stroke-width="7">W</text>
    </mask>
  </defs>

  <g stroke="#F7F4EE" fill="none">
    <!-- hairline double circle -->
    <circle cx="120" cy="120" r="114" stroke-width="1"/>
    <circle cx="120" cy="120" r="108" stroke-width=".6"/>
    <!-- basting-stitch inner ring: short rounded dashes -->
    <circle cx="120" cy="120" r="97" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="3.5 8.5"/>
  </g>

  <!-- house name, letterspaced microtype on the upper arc -->
  <text font-family="EB Garamond, Georgia, serif" font-size="9.5" letter-spacing="3.4" fill="#F7F4EE">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">MADAME&#160;WEDDING&#160;DESIGN</textPath>
  </text>

  <!-- woven MWD cipher: M solid · W engraved outline · D italic outline -->
  <g font-family="Cormorant Garamond, Georgia, 'Times New Roman', serif" text-anchor="middle">
    <text x="140" y="158" font-size="60" font-style="italic" fill="none" stroke="#F7F4EE" stroke-width=".9" mask="url(#weaveD)">D</text>
    <text x="122" y="152" font-size="58" fill="none" stroke="#F7F4EE" stroke-width=".9" mask="url(#weaveW)">W</text>
    <text x="103" y="146" font-size="64" fill="#F7F4EE">M</text>
  </g>

  <!-- tiny lozenge at the foot -->
  <rect x="116.2" y="199.2" width="7.6" height="7.6" fill="none" stroke="#F7F4EE" stroke-width="1" transform="rotate(45 120 203)"/>
</svg>
